<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — ProTech AI</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="admin-login.html">

<header id="appHeader"></header>

<main>
  <div class="auth-wrap">
    <span class="brand-mark gradient-brand" style="width:48px;height:48px;font-size:16px;border-radius:16px;display:flex;align-items:center;justify-content:center;">🔐</span>
    <h1>Admin Portal</h1>
    <p class="sub">Restricted access — authorized administrators only.</p>

    <form id="adminLoginForm" class="auth-card glass-panel" novalidate>
      <div class="field" id="userField">
        <label>Admin Username</label>
        <input type="text" id="adminUser" placeholder="admin" required />
        <p class="field-error">Incorrect username or password.</p>
      </div>
      <div class="field" id="passField">
        <label>Admin Password</label>
        <input type="password" id="adminPass" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-shine">Login to Admin Portal</button>
      <p class="oauth-note" style="margin-top:14px;">
        Demo credentials: <strong>admin</strong> / <strong>ProTech@2026</strong> — client-side demo only, not real security.
      </p>
    </form>

    <p class="auth-switch">Not an admin? <a href="index.html">Back to site</a></p>
  </div>
</main>

<footer id="appFooter"></footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/common.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("adminLoginForm");
    const userField = document.getElementById("userField");
    const userInput = document.getElementById("adminUser");
    const passInput = document.getElementById("adminPass");

    if (getAdminSession()) {
      window.location.href = "admin-dashboard.html";
      return;
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const u = userInput.value.trim();
      const p = passInput.value;
      if (u === ADMIN_CREDENTIALS.username && p === ADMIN_CREDENTIALS.password) {
        userField.classList.remove("invalid");
        setAdminSession({ username: u, loginAt: Date.now() });
        showToast("Welcome back, admin — redirecting…");
        setTimeout(() => (window.location.href = "admin-dashboard.html"), 600);
      } else {
        userField.classList.add("invalid");
        showToast("Incorrect admin username or password.");
      }
    });
  });
</script>
</body>
</html>
