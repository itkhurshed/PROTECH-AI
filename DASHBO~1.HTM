<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — ProTech AI</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="dashboard.html">

<header id="appHeader"></header>

<main>
  <div class="section">
    <div class="dash-hero glass-panel">
      <p class="greet" id="greetLine" style="color:var(--primary);"></p>
      <h1>What do you want to do today?</h1>
    </div>

    <div class="grid-actions" id="actionGrid"></div>

    <div style="margin-top:56px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;">
        <h2 style="font-size:22px;margin:0;">Business overview</h2>
        <span style="font-size:12px;color:var(--muted);">Updated just now · sample data</span>
      </div>
      <div class="grid-stats" id="statsGrid"></div>
    </div>
  </div>
</main>

<footer id="appFooter"></footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/common.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const session = getSession();
    const name = session && session.name ? session.name : "Mohammad";
    const hour = new Date().getHours();
    const greet = hour < 12 ? "Good Morning" : hour < 18 ? "Good Afternoon" : "Good Evening";
    document.getElementById("greetLine").textContent = `${greet}, ${name}`;

    document.getElementById("actionGrid").innerHTML = DASHBOARD_ACTIONS
      .map(
        (a) => `
      <a href="${a.href}" class="action-card card-hover glass-panel">
        <span class="icon">${a.icon}</span>
        <span class="label">${a.label}</span>
      </a>`
      )
      .join("");

    document.getElementById("statsGrid").innerHTML = DASHBOARD_STATS
      .map(
        (s) => `
      <div class="stat-card glass-panel">
        <div class="top">
          <span style="font-size:20px;">${s.icon}</span>
          ${s.trend ? `<span class="trend ${s.trend.startsWith("-") ? "down" : "up"}">${s.trend}</span>` : ""}
        </div>
        <p class="value">${s.value}</p>
        <p class="label">${s.label}</p>
      </div>`
      )
      .join("");
  });
</script>
</body>
</html>
